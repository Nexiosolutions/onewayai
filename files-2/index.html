<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>One Way AI — One Way US</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400;1,500&family=Didact+Gothic&family=IM+Fell+English:ital@0;1&display=swap" rel="stylesheet">
<style>
  :root {
    --green: #1a3a2a;
    --green-mid: #2d5a3d;
    --green-light: #3d7a52;
    --green-pale: #e8f0eb;
    --cream: #faf8f3;
    --white: #ffffff;
    --text: #1a3a2a;
    --muted: #6b8f76;
    --border: rgba(26,58,42,0.12);
    --border-dark: rgba(26,58,42,0.25);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--cream);
    color: var(--text);
    font-family: 'Didact Gothic', sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    position: relative;
  }

  /* Subtle texture overlay */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%231a3a2a' fill-opacity='0.02'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");
    pointer-events: none;
    z-index: 0;
  }

  /* Navbar */
  .navbar {
    position: sticky;
    top: 0;
    z-index: 100;
    background: var(--green);
    padding: 0 40px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    height: 64px;
    border-bottom: 1px solid rgba(255,255,255,0.08);
  }

  .nav-logo {
    display: flex;
    align-items: center;
    gap: 14px;
  }

  .nav-emblem {
    width: 40px;
    height: 40px;
    object-fit: contain;
    filter: brightness(0) invert(1);
  }

  .nav-wordmark {
    font-family: 'Cormorant', serif;
    font-size: 22px;
    font-weight: 500;
    letter-spacing: 0.06em;
    color: var(--white);
  }

  .nav-wordmark span {
    font-weight: 300;
    opacity: 0.7;
    font-size: 13px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    margin-left: 10px;
    font-family: 'Didact Gothic', sans-serif;
  }

  .nav-right {
    font-family: 'Didact Gothic', sans-serif;
    font-size: 11px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: rgba(255,255,255,0.45);
  }

  /* Main */
  .main {
    flex: 1;
    position: relative;
    z-index: 1;
    max-width: 800px;
    width: 100%;
    margin: 0 auto;
    padding: 0 28px;
  }

  /* Hero */
  .hero {
    text-align: center;
    padding: 70px 0 50px;
    animation: fadeUp 0.8s ease both;
  }

  .hero-logo {
    width: 100px;
    height: 100px;
    object-fit: contain;
    margin-bottom: 24px;
    animation: fadeUp 0.8s ease both;
  }
    display: flex;
    align-items: center;
    gap: 20px;
    margin-bottom: 32px;
    opacity: 0.3;
  }
  .hero-rule-line { flex: 1; height: 1px; background: var(--green); }
  .hero-rule-cross { font-size: 14px; color: var(--green); }

  .hero h1 {
    font-family: 'Cormorant', serif;
    font-size: clamp(38px, 7vw, 68px);
    font-weight: 300;
    line-height: 1.1;
    color: var(--green);
    letter-spacing: -0.01em;
    margin-bottom: 8px;
  }

  .hero h1 em {
    font-style: italic;
    font-weight: 400;
  }

  .hero-tagline {
    font-family: 'Didact Gothic', sans-serif;
    font-size: 12px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--muted);
    margin-top: 16px;
  }

  /* Topic chips */
  .section-label {
    font-size: 10px;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    color: var(--muted);
    text-align: center;
    margin-bottom: 14px;
    font-family: 'Didact Gothic', sans-serif;
  }

  .chips {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    justify-content: center;
    margin-bottom: 36px;
    animation: fadeUp 0.8s ease 0.1s both;
  }

  .chip {
    background: var(--white);
    border: 1px solid var(--border-dark);
    color: var(--green);
    padding: 8px 16px;
    border-radius: 2px;
    font-size: 12px;
    font-family: 'Didact Gothic', sans-serif;
    letter-spacing: 0.05em;
    cursor: pointer;
    transition: all 0.2s ease;
  }
  .chip:hover {
    background: var(--green);
    color: var(--white);
    border-color: var(--green);
  }

  /* Input */
  .input-wrap {
    background: var(--white);
    border: 1px solid var(--border-dark);
    border-radius: 2px;
    padding: 18px 18px 18px 22px;
    display: flex;
    gap: 12px;
    align-items: flex-end;
    transition: border-color 0.2s, box-shadow 0.2s;
    animation: fadeUp 0.8s ease 0.05s both;
    margin-bottom: 48px;
    box-shadow: 0 2px 12px rgba(26,58,42,0.04);
  }
  .input-wrap:focus-within {
    border-color: var(--green-mid);
    box-shadow: 0 2px 20px rgba(26,58,42,0.08);
  }

  textarea {
    flex: 1;
    background: none;
    border: none;
    outline: none;
    color: var(--text);
    font-family: 'IM Fell English', serif;
    font-size: 17px;
    line-height: 1.65;
    resize: none;
    min-height: 50px;
    max-height: 130px;
  }
  textarea::placeholder {
    color: var(--muted);
    font-style: italic;
    opacity: 0.7;
  }

  .send-btn {
    background: var(--green);
    border: none;
    border-radius: 2px;
    width: 42px;
    height: 42px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    transition: all 0.2s ease;
  }
  .send-btn:hover:not(:disabled) {
    background: var(--green-mid);
    box-shadow: 0 4px 16px rgba(26,58,42,0.3);
    transform: translateY(-1px);
  }
  .send-btn:disabled { opacity: 0.3; cursor: not-allowed; transform: none; }
  .send-btn svg { width: 16px; height: 16px; fill: var(--white); }

  /* Conversation */
  .conversation {
    display: flex;
    flex-direction: column;
    gap: 32px;
    padding-bottom: 80px;
  }

  /* User bubble */
  .msg-user {
    display: flex;
    justify-content: flex-end;
    animation: fadeUp 0.4s ease both;
  }
  .msg-user-bubble {
    background: var(--green);
    color: var(--white);
    border-radius: 2px 2px 0 2px;
    padding: 14px 20px;
    max-width: 72%;
    font-family: 'IM Fell English', serif;
    font-size: 16px;
    line-height: 1.6;
  }

  /* AI response */
  .msg-ai { animation: fadeUp 0.5s ease both; }

  .ai-header {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 16px;
  }
  .ai-seal {
    width: 28px; height: 28px;
    border: 1px solid var(--border-dark);
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 11px;
    color: var(--green);
    background: var(--white);
    flex-shrink: 0;
  }
  .ai-label {
    font-size: 10px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--muted);
    font-family: 'Didact Gothic', sans-serif;
  }

  .verse-card {
    background: var(--white);
    border: 1px solid var(--border-dark);
    border-left: 3px solid var(--green);
    border-radius: 0 2px 2px 0;
    padding: 28px 28px 24px 30px;
    margin-bottom: 14px;
    box-shadow: 0 2px 16px rgba(26,58,42,0.05);
  }

  .verse-text {
    font-family: 'Cormorant', serif;
    font-style: italic;
    font-size: clamp(18px, 2.8vw, 24px);
    font-weight: 400;
    line-height: 1.7;
    color: var(--green);
    margin-bottom: 16px;
  }

  .verse-ref {
    display: inline-block;
    font-family: 'Didact Gothic', sans-serif;
    font-size: 11px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--white);
    background: var(--green);
    padding: 4px 12px;
    border-radius: 1px;
  }

  .ai-explanation {
    font-family: 'IM Fell English', serif;
    font-size: 15px;
    line-height: 1.8;
    color: var(--muted);
    padding-left: 2px;
  }

  /* Loading */
  .loading {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 12px 0;
  }
  .loading-dots { display: flex; gap: 6px; }
  .loading-dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--green-mid);
    animation: pulse 1.3s ease infinite;
  }
  .loading-dot:nth-child(2) { animation-delay: 0.18s; }
  .loading-dot:nth-child(3) { animation-delay: 0.36s; }
  .loading-text {
    font-family: 'IM Fell English', serif;
    font-style: italic;
    font-size: 15px;
    color: var(--muted);
  }

  /* Error */
  .error-msg {
    background: #fff5f5;
    border: 1px solid rgba(180,60,60,0.2);
    border-radius: 2px;
    padding: 14px 18px;
    color: #b44040;
    font-size: 14px;
    font-family: 'Didact Gothic', sans-serif;
  }

  /* Footer */
  .footer {
    background: var(--green);
    text-align: center;
    padding: 28px 20px;
    position: relative;
    z-index: 1;
  }
  .footer-verse {
    font-family: 'Cormorant', serif;
    font-style: italic;
    font-size: 15px;
    color: rgba(255,255,255,0.6);
    margin-bottom: 6px;
  }
  .footer-org {
    font-family: 'Didact Gothic', sans-serif;
    font-size: 10px;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    color: rgba(255,255,255,0.3);
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(14px); }
    to { opacity: 1; transform: translateY(0); }
  }
  @keyframes pulse {
    0%, 80%, 100% { opacity: 0.2; transform: scale(0.8); }
    40% { opacity: 1; transform: scale(1); }
  }
</style>
</head>

    <textarea id="userInput" placeholder="How are you feeling? What are you going through…" rows="2" onkeydown="handleKey(event)" oninput="autoResize(this)"></textarea>
    <button class="send-btn" id="sendBtn" onclick="sendMessage()" title="Find a verse">
      <svg viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
    </button>
  </div>

  <div class="conversation" id="conversation"></div>
</div>

<footer class="footer">
  <p class="footer-verse">"I am the way, the truth, and the life." — John 14:6</p>
  <p class="footer-org">One Way US · Non-Profit Ministry</p>
</footer>

<script>
function usePrompt(text) {
  const input = document.getElementById('userInput');
  input.value = text;
  autoResize(input);
  input.focus();
}
function autoResize(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 130) + 'px';
}
function handleKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    sendMessage();
  }
}
async function sendMessage() {
  const input = document.getElementById('userInput');
  const text = input.value.trim();
  if (!text) return;
  const btn = document.getElementById('sendBtn');
  btn.disabled = true;
  input.disabled = true;
  appendUserMessage(text);
  input.value = '';
  autoResize(input);
  const loadingId = 'loading-' + Date.now();
  appendLoading(loadingId);
  try {
    const response = await fetch('/ask', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ message: text })
    });
    const data = await response.json();
    removeLoading(loadingId);
    if (data.error) {
      appendError('There was an issue connecting. Please try again.');
    } else {
      appendVerseResponse(data);
    }
  } catch(err) {
    removeLoading(loadingId);
    appendError('Could not reach the server. Please try again.');
  }
  btn.disabled = false;
  input.disabled = false;
  input.focus();
}
function appendUserMessage(text) {
  const conv = document.getElementById('conversation');
  const el = document.createElement('div');
  el.className = 'msg-user';
  el.innerHTML = `<div class="msg-user-bubble">${escapeHtml(text)}</div>`;
  conv.appendChild(el);
  el.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
}
function appendLoading(id) {
  const conv = document.getElementById('conversation');
  const el = document.createElement('div');
  el.className = 'loading';
  el.id = id;
  el.innerHTML = `<div class="loading-dots"><div class="loading-dot"></div><div class="loading-dot"></div><div class="loading-dot"></div></div><span class="loading-text">Searching the scriptures…</span>`;
  conv.appendChild(el);
  el.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
}
function removeLoading(id) {
  const el = document.getElementById(id);
  if (el) el.remove();
}
function appendVerseResponse({ verse, reference, explanation }) {
  const conv = document.getElementById('conversation');
  const el = document.createElement('div');
  el.className = 'msg-ai';
  el.innerHTML = `
    <div class="ai-header"><div class="ai-seal">✝</div><span class="ai-label">One Way AI</span></div>
    <div class="verse-card">
      <div class="verse-text">"${escapeHtml(verse)}"</div>
      <span class="verse-ref">${escapeHtml(reference)}</span>
    </div>
    <div class="ai-explanation">${escapeHtml(explanation)}</div>`;
  conv.appendChild(el);
  el.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
}
function appendError(msg) {
  const conv = document.getElementById('conversation');
  const el = document.createElement('div');
  el.innerHTML = `<div class="error-msg">⚠️ ${escapeHtml(msg)}</div>`;
  conv.appendChild(el);
}
function escapeHtml(text) {
  const d = document.createElement('div');
  d.textContent = text;
  return d.innerHTML;
}
</script>
</body>
</html>
